openapi: 3.0.0
info:
  title: NEO-Sentinel API
  version: 1.0.0
  description: Microservice system for tracking hazardous asteroids based on user risk profiles.
paths:
  /asteroids:
    get:
      summary: Get normalized asteroid data
      responses:
        '200':
          description: A list of clean asteroid records
  /users/{id}:
    get:
      summary: Get user risk preferences
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
  /report/{user_id}:
    get:
      summary: Generate a risk report for a specific user