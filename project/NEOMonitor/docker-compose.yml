services:
  # 1. The Data Provider
  asteroid-service:
    build: ./asteroid-service
    ports:
      - "5001:5001"
    environment:
      - NASA_API_KEY=${NASA_API_KEY:-DEMO_KEY}
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - redis

  # 2. The Persistence Skeleton (Former Watchlist)
  user-watchlist:
    build: ./user-watchlist-service
    ports:
      - "5002:5002"

  # 3. The Logic Engine
  risk-analysis-service:
    build: ./risk-analysis-service
    ports:
      - "5003:5003"
    environment:
      - ASTEROID_SERVICE_URL=http://asteroid-service:5001
    depends_on:
      - asteroid-service

  # 4. The Entry Point (Bouncer)
  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    environment:
      - ASTEROID_SERVICE_URL=http://asteroid-service:5001
      - RISK_SERVICE_URL=http://risk-analysis-service:5003
      - USER_SERVICE_URL=http://user-watchlist:5002
      - UI_SERVICE_URL=http://ui-dashboard:5000
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - asteroid-service
      - risk-analysis-service
      - redis

  # 5. The User Interface
  ui-dashboard:
    build: ./ui-dashboard
    ports:
      - "5000:5000"
    depends_on:
      - api-gateway

  # 6. Shared Cache
  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"

  # 7. Database
  postgresql:
    image: "postgres:alpine"
    environment:
      - POSTGRES_DB=neomonitor
      - POSTGRES_USER=neo_user
      - POSTGRES_PASSWORD=neo_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

networks:
  default:
    name: neomonitor-network